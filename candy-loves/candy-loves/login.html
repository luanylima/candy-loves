<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Candy Love's</title>
   <style>
    /* Reset básico */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #f3e0de 0%, #f5d8da 100%); /* fundo pastel vintage mais visível */
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background-color: #fdf5f6; /* branco rosado suave */
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(184,59,94,0.2); /* sombra vintage rosa */
    overflow: hidden;
    max-width: 450px;
    width: 100%;
    text-align: center;
    padding: 40px;
}

.header {
    margin-bottom: 30px;
}

.header h1 {
    color: #b83b5e; /* rosa/vinho forte para destaque */
    font-size: 2rem;
    margin-bottom: 20px;
}

.header img {
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 5px 15px rgba(184,59,94,0.3);
}

.form-container h2 {
    color: #b83b5e;
    margin-bottom: 25px;
    font-size: 1.8rem;
}

#register-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

#register-form input {
    padding: 12px 15px;
    border: 2px solid #f8d6dc; /* borda rosa antigo */
    border-radius: 25px;
    font-size: 1rem;
    transition: all 0.3s ease;
    outline: none;
}

#register-form input:focus {
    border-color: #b83b5e;
    box-shadow: 0 0 5px rgba(184,59,94,0.4);
}

#register-form button {
    background-color: #b83b5e;
    color: #fff4f4;
    border: none;
    padding: 12px;
    border-radius: 25px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

#register-form button:hover {
    background-color: #92334b; /* tom mais escuro no hover */
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(184,59,94,0.4);
}

.form-container p {
    margin-top: 25px;
    color: #5a4a4a; /* texto marrom suave */
}

.form-container a {
    color: #b83b5e;
    text-decoration: none;
    font-weight: bold;
}

.form-container a:hover {
    text-decoration: underline;
}

@media (max-width: 480px) {
    .container {
        padding: 25px;
    }
    
    .header h1 {
        font-size: 1.5rem;
    }
    
    .header img {
        width: 120px;
        height: 120px;
    }
}
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Candy Love's</h1>
            <img src="https://i.pinimg.com/736x/40/2b/e4/402be4a859fd33d361fe0992accda514.jpg" alt="Cupcake" width="150" height="150">
        </div>
        <div class="form-container">
            <h2>Cadastro</h2>
            <form id="register-form">
                <input type="text" id="name" placeholder="Nome Completo" required>
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit">Cadastrar</button>
            </form>
            <p>Já tem uma conta? <a href="login.html">Faça Login</a></p>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Validação simples
            if(name && email && password) {
                alert(`Cadastro realizado com sucesso!\nBem-vindo(a) ${name}!`);
                // Aqui você pode redirecionar para outra página
                // window.location.href = 'pagina-inicial.html';
                this.reset();
            } else {
                alert('Por favor, preencha todos os campos!');
            }
        });
    </script>
</body>
</html>
