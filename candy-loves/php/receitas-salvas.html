<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Receitas - Candy's Love's</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f9f5f2 0%, #f5f0ed 100%);
            color: #3b2c2c;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Botão Voltar */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FFC5D3 0%, #FFB0C2 100%);
            color: #555;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 197, 211, 0.3);
            margin-bottom: 30px;
            display: inline-block;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(255, 197, 211, 0.4);
            background: linear-gradient(135deg, #FFB0C2 0%, #FF99B3 100%);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 35px;
            background: linear-gradient(135deg, #d8a7b1 0%, #c9949f 100%);
            color: #fff;
            border-radius: 20px;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(184, 59, 94, 0.15);
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-family: 'Playfair Display', serif;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-info i {
            font-size: 1.5rem;
        }

        .contador {
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* Seções */
        .section {
            margin-bottom: 70px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            color: #b83b5e;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            padding-left: 15px;
            border-left: 5px solid #b83b5e;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Playfair Display', serif;
        }

        .section-title i {
            font-size: 2.5rem;
        }

        /* Cards Grid */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: linear-gradient(135deg, #fffaf7 0%, #fff5f0 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(90, 70, 70, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 16px 48px rgba(184, 59, 94, 0.18);
            border-color: #b83b5e;
        }

        .card-image {
            position: relative;
            width: 100%;
            height: 240px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s ease;
        }

        .card:hover .card-overlay {
            background: rgba(184, 59, 94, 0.1);
        }

        .card-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card h3 {
            color: #b83b5e;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.3px;
        }

        .card p {
            color: #6e5f5f;
            line-height: 1.7;
            margin-bottom: 20px;
            flex-grow: 1;
            font-size: 0.95rem;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
        }

        .card button {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add {
            background: linear-gradient(135deg, #b83b5e 0%, #a02d50 100%);
            color: #fffaf7;
            box-shadow: 0 4px 12px rgba(184, 59, 94, 0.2);
        }

        .add:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(184, 59, 94, 0.3);
            background: linear-gradient(135deg, #a02d50 0%, #8b2545 100%);
        }

        .remove {
            background: linear-gradient(135deg, #f4cccc 0%, #e8b8b8 100%);
            color: #b83b5e;
            box-shadow: 0 4px 12px rgba(184, 59, 94, 0.1);
        }

        .remove:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(184, 59, 94, 0.15);
            background: linear-gradient(135deg, #e8b8b8 0%, #dca5a5 100%);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 30px;
            background: linear-gradient(135deg, rgba(255, 197, 211, 0.1) 0%, rgba(216, 167, 177, 0.1) 100%);
            border-radius: 20px;
            border: 2px dashed #d8a7b1;
        }

        .empty-state i {
            font-size: 4rem;
            color: #d8a7b1;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state p {
            color: #8b7575;
            font-size: 1.1rem;
            font-weight: 500;
        }

        #nenhuma {
            display: none;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 30px;
            background: linear-gradient(135deg, #d8a7b1 0%, #c9949f 100%);
            color: #fffaf7;
            border-radius: 20px 20px 0 0;
            margin-top: 80px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }

        /* Responsividade */
        @media (max-width: 1024px) {
            .cards {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 25px;
            }

            .section-title {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }

            .header {
                flex-direction: column;
                gap: 20px;
                padding: 20px 25px;
                text-align: center;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header-info {
                width: 100%;
                justify-content: center;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .section-title {
                font-size: 1.5rem;
                margin-bottom: 20px;
            }

            .card-image {
                height: 200px;
            }

            .card-content {
                padding: 20px;
            }

            .card h3 {
                font-size: 1.2rem;
            }

            .card p {
                font-size: 0.9rem;
                margin-bottom: 15px;
            }

            .card button {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 12px;
            }

            .back-btn {
                width: 100%;
                justify-content: center;
                padding: 12px 15px;
                font-size: 0.9rem;
            }

            .header {
                padding: 15px 15px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header-info {
                font-size: 0.95rem;
                padding: 10px 15px;
            }

            .section {
                margin-bottom: 50px;
            }

            .section-title {
                font-size: 1.3rem;
                padding-left: 10px;
            }

            .section-title i {
                font-size: 1.8rem;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card-image {
                height: 180px;
            }

            .card-content {
                padding: 15px;
            }

            .card h3 {
                font-size: 1.1rem;
                margin-bottom: 8px;
            }

            .card p {
                font-size: 0.85rem;
                margin-bottom: 12px;
                line-height: 1.5;
            }

            .card button {
                padding: 10px 12px;
                font-size: 0.8rem;
                gap: 4px;
            }

            .empty-state {
                padding: 40px 20px;
            }

            .empty-state i {
                font-size: 3rem;
                margin-bottom: 15px;
            }

            .empty-state p {
                font-size: 0.95rem;
            }

            footer {
                padding: 30px 15px;
                margin-top: 50px;
            }
        }

    </style>
</head>
<body>

<div class="container">
    <!-- Botão Voltar -->
    <a href="receitas.php" class="back-btn">
        <span>←</span> Voltar
    </a>

    <!-- Header -->
    <header class="header">
        <h1>🍓 Minhas Receitas</h1>
        <div class="header-info">
            <i class="fas fa-bookmark"></i>
            <span>Receitas Guardadas:</span>
            <span class="contador" id="contador">0</span>
        </div>
    </header>

    <!-- Seção Receitas Guardadas -->
    <section class="section">
        <h2 class="section-title">
            <i class="fas fa-heart"></i> Minhas Receitas Guardadas
        </h2>
        <div class="cards" id="receitas-guardadas">
            <div class="empty-state" id="nenhuma">
                <i class="fas fa-bookmark"></i>
                <p>Nenhuma receita guardada ainda.</p>
                <p style="font-size: 0.9rem; margin-top: 10px; color: #a0898a;">Volte e guarde suas receitas favoritas!</p>
            </div>
        </div>
    </section>

    <!-- Seção Receitas Disponíveis -->
    <section class="section">
        <h2 class="section-title">
            <i class="fas fa-utensils"></i> Receitas Disponíveis
        </h2>
        <div class="cards" id="receitas-disponiveis">
            <!-- Receitas serão inseridas pelo JS -->
        </div>
    </section>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 Candy's Love's — Receitas da Vovó</p>
</footer>

<script>
const receitas = [
    {id:1, nome:'Bolo de Chocolate', descricao:'Bolo macio com cobertura cremosa de chocolate derretido. Perfeito para qualquer celebração.', imagem:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjkICuWPLYhxJahBKHYae7L28yP2SaPr2u7w&s'},
    {id:2, nome:'Salada Mediterrânea', descricao:'Salada fresca com azeitonas, tomate, queijo feta e tempero de azeite. Saudável e deliciosa.', imagem:'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=400&h=300&fit=crop'},
    {id:3, nome:'Lasanha de Frango', descricao:'Lasanha cremosa recheada com frango desfiado e molho béchamel. Clássico irresistível.', imagem:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdNIhrSSbGLMOk6kpJD953L1KaYt3L-wZ6ww&s'},
    {id:4, nome:'Pudim de Leite Condensado', descricao:'Pudim cremoso e macio com calda de caramelo crocante. Sobremesa de vovó.', imagem:'https://guiadacozinha.com.br/wp-content/uploads/2019/10/pudim-leite-condensado-furadinho-coco.jpg'},
    {id:5, nome:'Pizza Caseira', descricao:'Pizza feita em casa com massa crocante, molho de tomate fresco e muçarela derretida.', imagem:'https://receitatodahora.com.br/wp-content/uploads/2023/03/pizza-caseira-de-liquidificador-20-03.jpg'},
    {id:6, nome:'Brigadeiro Gourmet', descricao:'Brigadeiro cremoso com chocolate belga e cobertura de granulado. Perfeito como presente.', imagem:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSppLsL2yTLmTZAe4pWdXKl3wdRWAuVEFjQJQ&s'}
];

let guardadas = [];

function atualizarContador(){
    document.getElementById('contador').textContent = guardadas.length;
    const container = document.getElementById('receitas-guardadas');
    if(guardadas.length === 0){
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-bookmark"></i>
                <p>Nenhuma receita guardada ainda.</p>
                <p style="font-size: 0.9rem; margin-top: 10px; color: #a0898a;">Volte e guarde suas receitas favoritas!</p>
            </div>
        `;
    }
}

function renderReceitasDisponiveis(){
    const container = document.getElementById('receitas-disponiveis');
    container.innerHTML = '';
    receitas.forEach(r => {
        const card = document.createElement('div');
        card.className = 'card';
        const jaGuardada = guardadas.some(rg => rg.id === r.id);
        card.innerHTML = `
            <div class="card-image">
                <img src="${r.imagem}" alt="${r.nome}">
                <div class="card-overlay"></div>
            </div>
            <div class="card-content">
                <h3>${r.nome}</h3>
                <p>${r.descricao}</p>
                <div class="card-buttons">
                    <button class="add" onclick="guardar(${r.id})">
                        <i class="fas fa-bookmark"></i> ${jaGuardada ? 'Já Guardada' : 'Guardar'}
                    </button>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function renderGuardadas(){
    const container = document.getElementById('receitas-guardadas');
    if(guardadas.length === 0){
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-bookmark"></i>
                <p>Nenhuma receita guardada ainda.</p>
                <p style="font-size: 0.9rem; margin-top: 10px; color: #a0898a;">Volte e guarde suas receitas favoritas!</p>
            </div>
        `;
        return;
    }
    container.innerHTML = '';
    guardadas.forEach(r => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-image">
                <img src="${r.imagem}" alt="${r.nome}">
                <div class="card-overlay"></div>
            </div>
            <div class="card-content">
                <h3>${r.nome}</h3>
                <p>${r.descricao}</p>
                <div class="card-buttons">
                    <button class="remove" onclick="remover(${r.id})">
                        <i class="fas fa-trash"></i> Remover
                    </button>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function guardar(id){
    const receita = receitas.find(r => r.id === id);
    if(!guardadas.some(r => r.id === id)){
        guardadas.push(receita);
    }
    renderGuardadas();
    renderReceitasDisponiveis();
    atualizarContador();
}

function remover(id){
    guardadas = guardadas.filter(r => r.id !== id);
    renderGuardadas();
    renderReceitasDisponiveis();
    atualizarContador();
}

renderReceitasDisponiveis();
renderGuardadas();
atualizarContador();
</script>

</body>
</html>
